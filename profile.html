<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — FoodPack</title>
    <meta name="description" content="View your FoodPack profile, order history, and favourite foods.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="toast-container" class="toast-container"></div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <span class="nav-logo-icon">🍽️</span>
                <span class="nav-logo-text">FoodPack</span>
            </a>
            <div style="flex:1"></div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><span class="icon">🏠</span><span>Home</span></a>
                <a href="menu.html" class="nav-link"><span class="icon">🍴</span><span>Menu</span></a>
                <a href="profile.html" class="nav-link active"><span class="icon">👤</span><span>Profile</span></a>
                <button class="dark-toggle">🌙</button>
                <a href="cart.html" class="cart-btn">
                    <span>🛒</span><span>Cart</span>
                    <span class="cart-badge" style="display:none">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- PAGE -->
    <main class="page-wrap">
        <div class="container">
            <h1 class="page-title">👤 My Profile</h1>
            <div class="profile-layout">
                <!-- SIDEBAR -->
                <div>
                    <div class="profile-card" id="profile-sidebar">
                        <!-- Rendered by JS -->
                    </div>
                </div>
                <!-- MAIN CONTENT -->
                <div>
                    <div class="tab-content active" id="tab-orders">
                        <h2 class="section-title" style="margin-bottom:20px">📦 Order History</h2>
                        <div id="order-history-list"></div>
                    </div>
                    <div class="tab-content" id="tab-favourites">
                        <h2 class="section-title" style="margin-bottom:20px">❤️ Favourite Foods</h2>
                        <div id="fav-grid" class="food-grid"></div>
                    </div>
                    <div class="tab-content" id="tab-settings">
                        <h2 class="section-title" style="margin-bottom:20px">⚙️ Settings</h2>
                        <div class="form-card">
                            <div class="form-card-title">Account Preferences</div>
                            <div style="display:flex;flex-direction:column;gap:16px">
                                <div
                                    style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
                                    <div>
                                        <div style="font-weight:600">🌙 Dark Mode</div>
                                        <div style="font-size:13px;color:var(--text-muted)">Toggle dark interface</div>
                                    </div>
                                    <button class="dark-toggle"
                                        style="font-size:22px;width:48px;height:28px;border-radius:99px;border:1px solid var(--border)">🌙</button>
                                </div>
                                <div
                                    style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
                                    <div>
                                        <div style="font-weight:600">🔔 Notifications</div>
                                        <div style="font-size:13px;color:var(--text-muted)">Order updates & offers</div>
                                    </div>
                                    <label style="position:relative;display:inline-block;width:44px;height:24px">
                                        <input type="checkbox" checked style="opacity:0;width:0;height:0"
                                            id="notif-toggle">
                                        <span id="toggle-track" onclick="toggleNotif()"
                                            style="position:absolute;cursor:pointer;inset:0;background:var(--accent);border-radius:12px;transition:.3s"></span>
                                    </label>
                                </div>
                                <div style="padding-top:8px">
                                    <button onclick="logout()"
                                        style="color:var(--danger);font-weight:700;font-size:14px;padding:12px 20px;border-radius:var(--radius-md);border:1.5px solid var(--danger);transition:all .2s;background:transparent;cursor:pointer"
                                        onmouseover="this.style.background='#fce8e8'"
                                        onmouseout="this.style.background='transparent'">
                                        🚪 Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none">
                <span>© 2026 FoodPack. All rights reserved.</span>
                <span>Made with ❤️ for food lovers</span>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        const USER_KEY = 'foodbyYupp_user';

        function switchProfileTab(tab) {
            ['orders', 'favourites', 'settings'].forEach(t => {
                document.getElementById('tab-' + t).classList.toggle('active', t === tab);
                const link = document.querySelector(`[data-ptab="${t}"]`);
                if (link) link.classList.toggle('active', t === tab);
            });
        }

        function logout() {
            localStorage.removeItem(USER_KEY);
            Toast.show('Logged out successfully', 'info');
            setTimeout(() => window.location.href = 'login.html', 1000);
        }

        function toggleNotif() {
            const track = document.getElementById('toggle-track');
            const chk = document.getElementById('notif-toggle');
            track.style.background = chk.checked ? 'var(--accent)' : 'var(--border)';
        }

        function renderSidebar(user) {
            const history = Cart.getHistory();
            const favCount = Favorites.getAll().length;
            document.getElementById('profile-sidebar').innerHTML = `
    <div class="avatar">${user.name ? user.name.charAt(0).toUpperCase() : '?'}</div>
    <div class="profile-name">${user.name || 'Guest User'}</div>
    <div class="profile-email">${user.email || 'Not logged in'}</div>
    ${user.joined ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">📅 Joined ${user.joined}</div>` : ''}
    <div class="profile-stats">
      <div><div class="p-stat-num">${history.length}</div><div class="p-stat-label">Orders</div></div>
      <div><div class="p-stat-num">${favCount}</div><div class="p-stat-label">Favourites</div></div>
      <div><div class="p-stat-num">4.8⭐</div><div class="p-stat-label">Rating</div></div>
    </div>
    <nav class="profile-nav">
      <div class="profile-nav-link active" data-ptab="orders"      onclick="switchProfileTab('orders')">📦 My Orders</div>
      <div class="profile-nav-link"        data-ptab="favourites"  onclick="switchProfileTab('favourites')">❤️ Favourites</div>
      <div class="profile-nav-link"        data-ptab="settings"    onclick="switchProfileTab('settings')">⚙️ Settings</div>
    </nav>`;
        }

        function renderOrderHistory() {
            const history = Cart.getHistory();
            const list = document.getElementById('order-history-list');
            if (history.length === 0) {
                list.innerHTML = `<div class="empty-cart">
      <div class="empty-icon">📦</div>
      <div class="empty-title">No orders yet!</div>
      <div class="empty-sub">Your past orders will appear here.</div>
      <a href="menu.html" class="btn-primary" style="display:inline-flex;margin-top:0">Order Now 🍔</a>
    </div>`;
                return;
            }
            list.innerHTML = history.map(order => {
                const statusMap = { Delivered: 'status-delivered', Processing: 'status-processing', Cancelled: 'status-cancelled' };
                const names = order.items.map(i => `${i.name} ×${i.qty}`).join(', ');
                return `<div class="order-history-item">
      <div class="order-id">🧾 Order ID: <strong>${order.id}</strong> · ${order.date}</div>
      <div class="order-items-list">${names}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span class="order-status-chip ${statusMap[order.status] || 'status-delivered'}">● ${order.status}</span>
        <span style="font-weight:700;color:var(--primary)">₹${order.total.toLocaleString('en-IN')}</span>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:6px">📍 ${order.address} · 💳 ${order.payment}</div>
    </div>`;
            }).join('');
        }

        function renderFavourites() {
            const favIds = Favorites.getAll();
            const grid = document.getElementById('fav-grid');
            if (favIds.length === 0) {
                grid.innerHTML = `<div class="empty-cart" style="grid-column:1/-1">
      <div class="empty-icon">🤍</div>
      <div class="empty-title">No favourites yet!</div>
      <div class="empty-sub">Heart food items to save them here.</div>
      <a href="menu.html" class="btn-primary" style="display:inline-flex;margin-top:0">Browse Menu</a>
    </div>`;
                return;
            }
            const favItems = FOOD_ITEMS.filter(f => favIds.includes(f.id));
            grid.innerHTML = '';
            favItems.forEach(item => {
                const card = createFoodCard(item);
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            DarkMode.init();
            Cart.init();
            Toast.init();

            const user = JSON.parse(localStorage.getItem(USER_KEY) || '{}');
            if (!user.email) {
                // Not logged in — redirect or show guest
                renderSidebar({ name: 'Guest', email: 'Not logged in' });
            } else {
                renderSidebar(user);
            }
            renderOrderHistory();
            renderFavourites();
        });
    </script>
</body>

</html>
