<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu — FoodPack</title>
    <meta name="description"
        content="Browse our full menu of delicious food items. Filter by category, search, and order online.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="toast-container" class="toast-container"></div>

    <!-- ── NAVBAR ────────────────────────────────────────────────── -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <span class="nav-logo-icon">🍽️</span>
                <span class="nav-logo-text">FoodPack</span>
            </a>
            <div class="nav-search">
                <span class="search-icon">🔍</span>
                <input type="text" id="nav-search-input" placeholder="Search for food, restaurants…" autocomplete="off">
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><span class="icon">🏠</span><span>Home</span></a>
                <a href="menu.html" class="nav-link active"><span class="icon">🍴</span><span>Menu</span></a>
                <a href="profile.html" class="nav-link"><span class="icon">👤</span><span>Profile</span></a>
                <a href="login.html" class="nav-link"><span class="icon">🔑</span><span>Login</span></a>
                <button class="dark-toggle" title="Toggle dark mode">🌙</button>
                <a href="cart.html" class="cart-btn">
                    <span>🛒</span><span>Cart</span>
                    <span class="cart-badge" style="display:none">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- ── MENU HERO ──────────────────────────────────────────────── -->
    <section class="menu-hero">
        <div class="container">
            <h1 class="menu-hero-title">🍴 Explore Our Full Menu</h1>
            <div class="menu-search">
                <span class="s-icon">🔍</span>
                <input type="text" id="menu-search-input" placeholder="Search pizzas, biryani, burgers…"
                    autocomplete="off">
            </div>
            <!-- Category Filter Pills -->
            <div class="filter-bar" id="cat-strip"></div>
        </div>
    </section>

    <!-- ── FOOD RESULTS ────────────────────────────────────────────── -->
    <section class="food-section">
        <div class="container">
            <p class="results-count" id="results-count">Loading…</p>
            <div id="food-grid" class="food-grid"></div>
        </div>
    </section>

    <!-- ── FOOTER ─────────────────────────────────────────────────── -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none">
                <span>© 2026 FoodPack. All rights reserved.</span>
                <span>Made with ❤️ for food lovers</span>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Wire up the hero search input to App
        document.addEventListener('DOMContentLoaded', () => {
            const heroInput = document.getElementById('menu-search-input');
            if (heroInput) {
                heroInput.addEventListener('input', e => {
                    App.searchQuery = e.target.value.trim();
                    // also sync nav search
                    const navInput = document.getElementById('nav-search-input');
                    if (navInput) navInput.value = App.searchQuery;
                    App.renderFoodGrid();
                });
            }
        });
    </script>
</body>

</html>
